<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Development Tracking — ChangeFlow</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="shell"></div>

<template id="pageTemplate">
  <div class="card">
    <div class="section-title">In-Flight Development Items</div>
    <div id="tableWrap"></div>
  </div>
</template>

<template id="devModalTemplate">
  <div class="modal-backdrop">
    <div class="modal" style="max-width:480px;">
      <div class="modal__head">
        <h3>Update Development</h3>
        <button class="modal__close" aria-label="Close">&times;</button>
      </div>
      <div class="modal__body">
        <div class="field"><label>Request</label><div id="dmReqSummary"></div></div>
        <div class="field">
          <label for="dmAssignee">Assigned Developer</label>
          <select id="dmAssignee"></select>
        </div>
        <div class="field-row">
          <div class="field"><label for="dmStart">Start Date</label><input type="date" id="dmStart" /></div>
          <div class="field"><label for="dmTarget">Target Date</label><input type="date" id="dmTarget" /></div>
        </div>
    
        <div class="field">
          <label for="dmStatus">Move Status To</label>
          <select id="dmStatus">
            <option value="">— No change —</option>
            <option value="BRD Submission">BRD Submission</option>
            <option value="In Development">In Development</option>
            <option value="QA">QA</option>
            <option value="Testing/UAT">UAT</option>
            <option value="Production">Production</option>
            <option value="Closed">Closed</option>
          </select>
        </div>
        <button class="btn btn-primary" id="dmSave" style="width:100%; justify-content:center;">Save</button>
      </div>
    </div>
  </div>
</template>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script src="js/request-modal.js"></script>
<script src="js/development.js"></script>
</body>
</html>
