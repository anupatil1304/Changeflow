<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChangeFlow — Log in</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-card__brand">Change<span>Flow</span></div>
    <div class="login-card__sub">Application &amp; Enhancement Request Management</div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;" id="loginBtn">
        Log in
      </button>
      <div style="text-align:center; margin-top:14px;">
        <a href="#" id="forgotLink" style="font-size:13px;">Forgot password?</a>
      </div>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
