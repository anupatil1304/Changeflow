<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PGC Review — ChangeFlow</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="shell"></div>

<template id="pageTemplate">
  <div class="card">
    <div class="section-title">Requests Awaiting PGC Decision</div>
    <div id="tableWrap"></div>
  </div>
</template>

<template id="decisionModalTemplate">
  <div class="modal-backdrop">
    <div class="modal" style="max-width:480px;">
      <div class="modal__head">
        <h3>Review Request</h3>
        <button class="modal__close" aria-label="Close">&times;</button>
      </div>
      <div class="modal__body">
        <div class="field"><label>Request</label><div id="dmReqSummary"></div></div>
        <div class="field">
          <label for="dmRemarks">Remarks</label>
          <textarea id="dmRemarks" placeholder="Add a note for the requester…"></textarea>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn btn-approve" id="dmApprove">Approve</button>
          <button class="btn btn-reject" id="dmReject">Reject</button>
        </div>
      </div>
    </div>
  </div>
</template>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script src="js/request-modal.js"></script>
<script src="js/approval-shared.js"></script>
<script>
  initApprovalScreen({
    title: "pgc",
    pendingEndpoint: "/approvals/pgc",
    decideEndpoint: (id) => `/approvals/pgc/${id}`,
  });
</script>
</body>
</html>
