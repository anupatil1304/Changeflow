<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — ChangeFlow</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="shell"></div>

<template id="dashboardTemplate">
  <div class="grid grid-6" id="kpiRow"></div>

  <div class="grid grid-2" style="margin-top:18px;">
    <div class="card">
      <div class="section-title">Status-wise Breakdown</div>
      <canvas id="statusChart" height="200"></canvas>
    </div>
    <div class="card">
      <div class="section-title">Platform-wise Requests</div>
      <canvas id="platformChart" height="220"></canvas>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:18px;">
    <div class="card">
      <div class="section-title">Priority-wise Requests</div>
      <canvas id="priorityChart" height="220"></canvas>
    </div>
    <div class="card">
      <div class="section-title">Monthly Trend</div>
      <canvas id="trendChart" height="220"></canvas>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:18px;">
    <div class="card">
      <div class="section-title">SLA Aging (open requests, by days)</div>
      <canvas id="slaChart" height="220"></canvas>
    </div>
    <div class="card">
      <div class="section-title">Developer Workload</div>
      <canvas id="workloadChart" height="220"></canvas>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:18px;">
    <div class="card">
      <div class="section-title">Recent Activities</div>
      <ul class="timeline" id="recentActivities"></ul>
    </div>
    <div class="card" id="pendingApprovalsCard">
      <div class="section-title">Pending Approvals</div>
      <div id="pendingApprovals"></div>
    </div>
  </div>
</template>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script src="js/request-modal.js"></script>
<script src="js/dashboard.js?v=3"></script>
</body>
</html>
