<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Raise Request — ChangeFlow</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="shell"></div>

<template id="pageTemplate">
  <div class="card" style="max-width:640px;">
    <div class="section-title">New Project / Enhancement Request</div>
    <form id="raiseForm">
      <div class="field-row">
        <div class="field">
          <label for="type">Request Type</label>
          <select id="type" required>
            <option value="Enhancement">Enhancement</option>
            <option value="Project">Project</option>
          </select>
        </div>
        <div class="field">
          <label for="platformId">Platform</label>
          <select id="platformId" required></select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="categoryId">Category</label>
          <select id="categoryId"></select>
        </div>
        <div class="field">
          <label for="priority">Priority</label>
          <select id="priority" required>
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Describe the change you need…" required></textarea>
      </div>

      <div class="field">
        <label for="attachment">Attachment (optional)</label>
        <input type="file" id="attachment" />
        <div class="helper-text">PDF, image, Office doc, or CSV — up to 2 MB.</div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Submit Request</button>
    </form>
  </div>
</template>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script src="js/raise-request.js"></script>
</body>
</html>
